<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemantau - Monitoring Fasilitator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">MGL<span>Pemantau</span></div>
            <div class="header-right">
                <button class="btn-logout" id="logoutBtn">
                    <span>🚪</span>
                    <span class="logout-text">Keluar</span>
                </button>
            </div>
        </div>
    </div>
    
    <div class="greeting-card">
        <div class="greeting-avatar" id="avatar">👤</div>
        <div class="greeting-text">
            <div class="greeting-hello">Halo, Pemantau</div>
            <div class="greeting-name" id="userName">Pemantau</div>
            <div class="greeting-role" id="userRole">Pemantau - Monitoring</div>
            <div id="notifikasiStatusLokasi" style="margin: 15px 0; display: none;"></div>
        </div>
    </div>
    
    <!-- FILTER & REKAP BULANAN -->
    <div class="card">
        <div class="card-title">
            <span class="card-icon">🔍</span>
            <h3>Filter Rekap Bulanan</h3>
        </div>
        
        <div class="filter-group" style="margin-bottom: 10px;">
            <select id="filterKelurahan" class="filter-select">
                <option value="">Semua Kelurahan</option>
            </select>
        </div>
        
        <div class="filter-group">
            <select id="filterBulan" class="filter-select">
                <option value="1">Januari</option>
                <option value="2">Februari</option>
                <option value="3">Maret</option>
                <option value="4">April</option>
                <option value="5">Mei</option>
                <option value="6">Juni</option>
                <option value="7">Juli</option>
                <option value="8">Agustus</option>
                <option value="9">September</option>
                <option value="10">Oktober</option>
                <option value="11">November</option>
                <option value="12">Desember</option>
            </select>
            <select id="filterTahun" class="filter-select">
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
            <button class="btn-filter" onclick="applyFilter()" style="background: #27AE60;">Terapkan</button>
            <button class="btn-reset" onclick="resetFilter()">Reset</button>
        </div>

        <div style="margin-top: 15px;">
            <button class="btn-success" onclick="exportBulanan()" style="width: 100%; background: #27AE60;">
                📊 Export Excel Bulanan
            </button>
        </div>
    </div>
    
    <div class="card">
        <div class="card-title">
            <span class="card-icon">📊</span>
            <h3>Rekap Bulanan</h3>
            <span id="bulanDisplay" style="margin-left: auto; font-size: 12px;"></span>
        </div>
        
        <div style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="stat-card" style="flex:1;">
                <div class="stat-value" id="totalHari">0</div>
                <div class="stat-label">Total Hari Kerja</div>
            </div>
            <div class="stat-card" style="flex:1;">
                <div class="stat-value" id="rataHadir">0</div>
                <div class="stat-label">Rata-rata Hadir</div>
            </div>
            <div class="stat-card" style="flex:1;">
                <div class="stat-value" id="persenBulanan">0%</div>
                <div class="stat-label">Kehadiran</div>
            </div>
        </div>
        
        <div class="table-responsive" style="overflow-x: auto; width: 100%;">
            <table class="data-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr id="headerBulanan">
                        <th>No</th>
                        <th>Nama</th>
                        <th>Kelurahan</th>
                        <th>Hadir</th>
                        <th>Total Hari</th>
                        <th>Persentase</th>
                    </tr>
                </thead>
                <tbody id="tableBulanan">
                    <tr><td colspan="6" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div style="margin-top: 20px;">
            <h4>📈 Grafik Kehadiran (10 Terbawah)</h4>
            <div id="grafikContainer" style="height: 220px; display: flex; align-items: flex-end; gap: 8px; margin-top: 15px; padding-bottom: 20px; border-bottom: 1px solid #EEE;"></div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
    </div>
    
    <div class="modal" id="errorModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon">⚠️</div>
            <h3 class="modal-title">Terjadi Kesalahan</h3>
            <p class="modal-message" id="errorMessage"></p>
            <button class="modal-button" onclick="closeErrorModal()">Tutup</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script type="module" src="js/pemantau.js"></script>
</body>
</html>
